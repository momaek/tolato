name: release-agent

# Build tolato-agent binaries on tag push and attach them to a GitHub Release.
# Tag format: v*  (e.g. v0.1.0)
#
# The install script (scripts/install.sh) fetches
#   https://github.com/<repo>/releases/latest/download/tolato-agent-<os>-<arch>
# so the asset names below must stay in sync.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: agent/go.sum

      - name: build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          OUT="tolato-agent-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w" -o "../dist/${OUT}" ./cmd/agent
          (cd ../dist && sha256sum "${OUT}" > "${OUT}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: tolato-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
