services:
  postgres:
    image: postgres:16-alpine
    container_name: tolato-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tolato
      POSTGRES_PASSWORD: tolato
      POSTGRES_DB: tolato
    volumes:
      # Bind-mount so the data dir lives next to docker-compose.yaml — easy to
      # back up (tar) or migrate (rsync). On first start Postgres chowns this
      # to UID 70. On SELinux systems append `:Z`.
      - ./pgdata:/var/lib/postgresql/data
    # Not published to the host by default. Uncomment for local DB access.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tolato -d tolato"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    # Pin to a concrete tag in production, e.g. ghcr.io/momaek/tolato-server:v0.1.0
    image: ghcr.io/momaek/tolato-server:${TOLATO_VERSION:-latest}
    container_name: tolato-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bound to loopback by default. Put a reverse proxy in front for public access,
      # or override with e.g. SERVER_PORT=0.0.0.0:8080 to expose directly.
      - "${SERVER_PORT:-127.0.0.1:8080}:8080"
    volumes:
      # Copy config.example.yaml to config.yaml, edit it, then start.
      # DSN must reference the postgres service name (host=postgres).
      - ./config.yaml:/app/config.yaml:ro
      # Bind-mount for the runtime data dir (GeoIP mmdb cache, ~80 MB).
      # The entrypoint chowns this on every start, so an empty host dir
      # works fine on first run. On SELinux systems append `:Z`.
      - ./tolato-data:/app/data
